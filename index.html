<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TERMINAL OS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="desktop" class="desktop" role="application" aria-label="Terminal portfolio desktop"></div>

    <template id="terminal-template">
      <section class="terminal-window">
        <main class="terminal">
          <header class="terminal__header drag-handle">
            <p class="title">DEBUG CONSOLE [ENABLED]</p>
          </header>

          <section class="terminal__main">
            <section class="terminal__output" aria-live="polite"></section>
          </section>

          <form class="terminal__input-row" autocomplete="off">
            <label class="prompt">root@portfolio:/$</label>
            <span class="current-line-marker" aria-hidden="true">&gt;</span>
            <input
              class="terminal__input"
              type="text"
              spellcheck="false"
              aria-label="Terminal command input"
              placeholder="Type 'help' and press Enter"
            />
          </form>
        </main>
        <span class="resize-handle" aria-hidden="true"></span>
      </section>
    </template>

    <template id="document-template">
      <section class="terminal-window document-window" data-min-width="420" data-min-height="280">
        <main class="document">
          <header class="document__header drag-handle">
            <p class="document__title">DOCUMENT</p>
            <button class="document__close" type="button" aria-label="Close document window">x</button>
          </header>
          <section class="document__body" aria-live="polite"></section>
        </main>
        <span class="resize-handle" aria-hidden="true"></span>
      </section>
    </template>

    <script src="./main.js"></script>
  </body>
</html>
